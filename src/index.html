<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Register Form</title>

    <!-- Tailwind -->
    <link rel="stylesheet" href="./src/output.css" />
  </head>


  <body
    class="from-slate-100 to-blue-100 min-h-screen flex items-center justify-center px-4 py-8"
  >
    <!-- Form Container -->
    <main
      class="bg-white w-full sm:w-11/12 md:w-3/4 lg:w-1/2 xl:w-1/3 p-6 sm:p-8 rounded-3xl shadow-2xl border border-slate-200"
    >
      <!-- Title -->
      <h1
        class="text-3xl sm:text-4xl font-bold text-center text-slate-700 mb-8"
      >
        Register Form
      </h1>

      <!-- Form -->
      <form id="form" class="space-y-5">
        <!-- Firstname -->
        <section>
          <label
            for="firstname"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Firstname
          </label>

          <input
            type="text"
            name="firstname"
            id="firstname"
            required
            placeholder="Enter your firstname"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Lastname -->
        <section>
          <label
            for="lastname"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Lastname
          </label>

          <input
            type="text"
            name="lastname"
            id="lastname"
            required
            placeholder="Enter your lastname"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Email -->
        <section>
          <label
            for="email"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Email
          </label>

          <input
            type="email"
            name="email"
            id="email"
            required
            placeholder="example@mail.com"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Phone -->
        <section>
          <label
            for="phone"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Phone
          </label>

          <input
            type="text"
            name="phone"
            id="phone"
            required
            placeholder="999 999 999"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Age -->
        <section>
          <label
            for="age"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Age
          </label>

          <input
            type="number"
            name="age"
            id="age"
            required
            placeholder="Enter your age"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Description -->
        <section>
          <label
            for="description"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Description
          </label>

          <textarea
            name="description"
            id="description"
            rows="4"
            required
            placeholder="Tell us something about you..."
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          ></textarea>
        </section>

        <!-- Password -->
        <section>
          <label
            for="password"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Password
          </label>

          <input
            type="password"
            name="password"
            id="password"
            required
            placeholder="********"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Repeat Password -->
        <section>
          <label
            for="repeatPassword"
            class="block text-sm font-semibold text-slate-600 mb-2"
          >
            Repeat Password
          </label>

          <input
            type="password"
            name="repeatPassword"
            id="repeatPassword"
            required
            placeholder="********"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl transition duration-300 hover:scale-105 focus:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </section>

        <!-- Button -->
        <section>
          <button
            type="submit"
            class="w-full from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-blue-500 hover:scale-105 text-white font-bold py-3 rounded-xl shadow-lg transition duration-300"
          >
            Submit
          </button>
        </section>
      </form>
    </main>
<script>
  const formulario = document.getElementById("form");
  const password = document.getElementById("password");
  const repeatPassword = document.getElementById("repeatPassword");

  formulario.addEventListener("submit", function (event) {
    // Validar si las contraseñas son diferentes
    if (password.value !== repeatPassword.value) {
      // Detener envío
      event.preventDefault();

      // Mostrar alerta
      alert("¡Ups! Las contraseñas no coinciden.");
    }
  });
</script>
  </body>
</html>
